<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    body {
      font-family: "Aptos", "Segoe UI", sans-serif;
      font-size: 12pt;
      color: #111;
      margin: 12px;
    }

    .section-label {
      font-size: 10pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin: 14px 0 6px;
    }

    .snooze-btn {
      background-color: #fff;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.1s ease;
    }

    .snooze-btn:hover { background-color: #f0f0f0; }
    .snooze-btn:active { background-color: #ddd; }

    .snooze-btn:disabled {
      background-color: #ccc;
      border-color: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      background: #f3f3f3;
      font-size: 11pt;
      line-height: 1.35;
    }

    .status strong { display: block; margin-bottom: 4px; }
  </style>
</head>

<body>

  <div class="section-label">Snooze Email</div>
  <div style="font-size:10pt;color:#555;margin-bottom:8px;">
    Hides this email and returns it to your inbox after the selected time.
  </div>
  <button id="2snooze" class="snooze-btn">⏱ Snooze 2 Hours</button>
  <button id="4snooze" class="snooze-btn">⏱ Snooze 4 Hours</button>
  <button id="6snooze" class="snooze-btn">⏱ Snooze 6 Hours</button>

  <div id="status" class="status">
    <strong>Status</strong>
    Ready.
  </div>

<script>
  const SNOOZE_API_URL = "/api/snooze";

  Office.onReady((info) => {
    if (info.host !== Office.HostType.Outlook) return;

    wireSnoozeButton("2snooze", 2);
    wireSnoozeButton("4snooze", 4);
    wireSnoozeButton("6snooze", 6);
  });

  function wireSnoozeButton(id, hours) {
    document.getElementById(id).addEventListener("click", async () => {
      setAllButtonsEnabled(false);
      setStatus("Status", `Snoozing for ${hours} hour(s)…`);
      try {
        const item = Office.context.mailbox.item;
        if (!item) throw new Error("No email selected.");

        const itemId = item.itemId;
        if (!itemId) throw new Error("Could not get email ID. Are you reading an email?");

        console.log("Raw itemId:", itemId);

        let restId;
        try {
          restId = Office.context.mailbox.convertToRestId(
            itemId,
            Office.MailboxEnums.RestVersion.v2_0
          );
        } catch (convErr) {
          console.warn("convertToRestId failed, using raw itemId:", convErr);
          restId = itemId;
        }

        console.log("restId:", restId);

        const response = await fetch("/api/snooze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ itemId: restId, hours: hours })
        });

        console.log("Response status:", response.status);

        if (!response.ok) throw new Error(`API returned ${response.status}`);

        const wakeTime = new Date(Date.now() + hours * 60 * 60 * 1000);
        setStatus("Snoozed ✓", `This email will return to your inbox at ${wakeTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}.`);
      } catch (err) {
        console.error("Snooze error:", err);
        setStatus("Error", err?.message || String(err));
        setAllButtonsEnabled(true);
      }
    });
  }

  function setAllButtonsEnabled(enabled) {
    document.querySelectorAll(".snooze-btn").forEach(btn => btn.disabled = !enabled);
  }

  function setStatus(title, message) {
    const el = document.getElementById("status");
    el.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(message)}`;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])
    );
  }
</script>
</body>
</html>
