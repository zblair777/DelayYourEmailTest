<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    body {
      font-family: "Aptos", "Segoe UI", sans-serif;
      font-size: 12pt;
      color: #111;
      margin: 12px;
    }

    .snooze-btn {
      background-color: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.1s ease, border-color 0.1s ease, opacity 0.1s ease;
    }

    .snooze-btn:hover {
      background-color: #111;
    }

    .snooze-btn:active {
      background-color: #666;
      border-color: #444;
    }

    .snooze-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #status {
      margin-top: 12px;
      line-height: 1.4;
    }

    #status strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <div>Please select an amount of time you would like this email snoozed.</div>
  <br />

  <button id="snooze-4h" class="snooze-btn">4 Hours</button>
  <button id="snooze-24h" class="snooze-btn">24 Hours</button>
  <button id="snooze-nbd" class="snooze-btn">Next Business Day</button>
  <button id="snooze-nw" class="snooze-btn">Next Week</button>
  <button id="snooze-13d" class="snooze-btn">13 Days</button>
  <button id="snooze-30d" class="snooze-btn">30 Days</button>

  <div id="status"></div>

  <script>
    Office.onReady((info) => {
      if (info.host !== Office.HostType.Outlook) return;

      wireSnoozeButton("snooze-4h",  () => 4,              "4 hours");
      wireSnoozeButton("snooze-24h", () => 24,             "24 hours");
      wireSnoozeButton("snooze-nbd", nextBusinessDayHours, "next business day");
      wireSnoozeButton("snooze-nw",  () => 168,            "next week");
      wireSnoozeButton("snooze-13d", () => 312,            "13 days");
      wireSnoozeButton("snooze-30d", () => 720,            "30 days");
    });

    function nextBusinessDayHours() {
      const now = new Date();
      const target = new Date(now);

      const day = now.getDay();
      let daysToAdd;

      if (day === 5) daysToAdd = 3;       // Friday -> Monday
      else if (day === 6) daysToAdd = 2;  // Saturday -> Monday
      else if (day === 0) daysToAdd = 1;  // Sunday -> Monday
      else daysToAdd = 1;                 // Weekday -> next day

      target.setDate(now.getDate() + daysToAdd);
      target.setHours(9, 0, 0, 0);

      return Math.round((target - now) / (1000 * 60 * 60));
    }

    function wireSnoozeButton(id, getHours, label) {
      const button = document.getElementById(id);
      if (!button) return;

      button.addEventListener("click", async () => {
        setAllButtonsEnabled(false);
        setStatus("Status", `Snoozing until ${label}...`);

        try {
          const item = Office.context.mailbox.item;
          if (!item) {
            throw new Error("No email selected.");
          }

          const ewsId = item.itemId;
          if (!ewsId) {
            throw new Error("Could not get the email ID.");
          }

          let restId = null;
          try {
            restId = Office.context.mailbox.convertToRestId(
              ewsId,
              Office.MailboxEnums.RestVersion.v2_0
            );
          } catch (e) {
            console.warn("convertToRestId failed:", e);
          }

          const hours = Number(getHours());

          const payload = {
            itemId: restId || ewsId,
            ewsId: ewsId,
            restId: restId,
            internetMessageId: item.internetMessageId || null,
            subject: item.subject || null,
            hours: hours
          };

          console.log("Sending snooze payload:", payload);

          const response = await fetch("/api/snooze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          const responseText = await response.text().catch(() => "");

          if (!response.ok) {
            throw new Error(responseText || `API returned ${response.status}`);
          }

          const wakeTime = new Date(Date.now() + hours * 60 * 60 * 1000);
          const dateStr = wakeTime.toLocaleDateString([], {
            weekday: "short",
            month: "short",
            day: "numeric"
          });
          const timeStr = wakeTime.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
          });

          setStatus("Snoozed ✓", `This email will return to your inbox on ${dateStr} at ${timeStr}.`);
        } catch (err) {
          console.error("Snooze error:", err);
          setStatus("Error", err && err.message ? err.message : String(err));
        } finally {
          setAllButtonsEnabled(true);
        }
      });
    }

    function setAllButtonsEnabled(enabled) {
      document.querySelectorAll(".snooze-btn").forEach(btn => {
        btn.disabled = !enabled;
      });
    }

    function setStatus(title, message) {
      const el = document.getElementById("status");
      el.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(message)}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        }[m];
      });
    }
  </script>
</body>
</html>
