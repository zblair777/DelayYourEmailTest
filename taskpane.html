<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    body {
      font-family: "Aptos", "Segoe UI", sans-serif;
      font-size: 12pt;
      color: #111;
      margin: 12px;
    }

    .section-label {
      font-size: 10pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin: 14px 0 6px;
    }

    .snooze-btn {
      background-color: #fff;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.1s ease;
    }

    .snooze-btn:hover { background-color: #f0f0f0; }
    .snooze-btn:active { background-color: #ddd; }

    .snooze-btn:disabled {
      background-color: #ccc;
      border-color: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      background: #f3f3f3;
      font-size: 11pt;
      line-height: 1.35;
    }

    .status strong { display: block; margin-bottom: 4px; }
  </style>
</head>

<body>

  <div class="section-label">Snooze Email</div>
  <div style="font-size:10pt;color:#555;margin-bottom:8px;">
    Hides this email and returns it to your inbox after the selected time.
  </div>
  <button id="snooze-4h"  class="snooze-btn">⏱ 4 Hours</button>
  <button id="snooze-nbd" class="snooze-btn">⏱ Next Business Day</button>
  <button id="snooze-nw"  class="snooze-btn">⏱ Next Week</button>
  <button id="snooze-13d" class="snooze-btn">⏱ 13 Days</button>
  <button id="snooze-30d" class="snooze-btn">⏱ 30 Days</button>

  <div id="status" class="status">
    <strong>Status</strong>
    Ready.
  </div>

<script>
  Office.onReady((info) => {
    if (info.host !== Office.HostType.Outlook) return;

    wireSnoozeButton("snooze-4h",  () => 4,                    "4 hours");
    wireSnoozeButton("snooze-nbd", nextBusinessDayHours,        "next business day");
    wireSnoozeButton("snooze-nw",  () => 168,                   "next week");
    wireSnoozeButton("snooze-13d", () => 312,                   "13 days");
    wireSnoozeButton("snooze-30d", () => 720,                   "30 days");
  });

  /**
   * Returns the number of hours until 9 AM on the next business day.
   * Mon–Thu: next calendar day at 9 AM
   * Fri:     Monday at 9 AM
   * Sat:     Monday at 9 AM
   * Sun:     Monday at 9 AM
   */
  function nextBusinessDayHours() {
    const now = new Date();
    const target = new Date(now);

    const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
    let daysToAdd;
    if (day === 5) daysToAdd = 3;      // Fri → Mon
    else if (day === 6) daysToAdd = 2; // Sat → Mon
    else if (day === 0) daysToAdd = 1; // Sun → Mon
    else daysToAdd = 1;                // Mon–Thu → next day

    target.setDate(now.getDate() + daysToAdd);
    target.setHours(9, 0, 0, 0); // 9:00 AM

    const msUntilTarget = target - now;
    return msUntilTarget / (1000 * 60 * 60); // convert ms to hours
  }

  function wireSnoozeButton(id, getHours, label) {
    document.getElementById(id).addEventListener("click", async () => {
      setAllButtonsEnabled(false);
      setStatus("Status", `Snoozing until ${label}…`);
      try {
        const item = Office.context.mailbox.item;
        if (!item) throw new Error("No email selected.");

        const itemId = item.itemId;
        if (!itemId) throw new Error("Could not get email ID. Are you reading an email?");

        console.log("Raw itemId:", itemId);

        let restId;
        try {
          restId = Office.context.mailbox.convertToRestId(
            itemId,
            Office.MailboxEnums.RestVersion.v2_0
          );
        } catch (convErr) {
          console.warn("convertToRestId failed, using raw itemId:", convErr);
          restId = itemId;
        }

        console.log("restId:", restId);

        const hours = getHours();
        console.log("Snoozing for hours:", hours);

        const response = await fetch("/api/snooze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ itemId: restId, hours: hours })
        });

        console.log("Response status:", response.status);

        if (!response.ok) throw new Error(`API returned ${response.status}`);

        const wakeTime = new Date(Date.now() + hours * 60 * 60 * 1000);
        const dateStr = wakeTime.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        const timeStr = wakeTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setStatus("Snoozed ✓", `This email will return to your inbox on ${dateStr} at ${timeStr}.`);
      } catch (err) {
        console.error("Snooze error:", err);
        setStatus("Error", err?.message || String(err));
        setAllButtonsEnabled(true);
      }
    });
  }

  function setAllButtonsEnabled(enabled) {
    document.querySelectorAll(".snooze-btn").forEach(btn => btn.disabled = !enabled);
  }

  function setStatus(title, message) {
    const el = document.getElementById("status");
    el.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(message)}`;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])
    );
  }
</script>
</body>
</html>
