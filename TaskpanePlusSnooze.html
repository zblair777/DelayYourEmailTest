<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    body {
      font-family: "Aptos", "Segoe UI", sans-serif;
      font-size: 12pt;
      color: #111;
      margin: 12px;
    }

    .section-label {
      font-size: 10pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin: 14px 0 6px;
    }

    .delay-btn {
      background-color: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.1s ease, border-color 0.1s ease;
    }

    .snooze-btn {
      background-color: #fff;
      color: #000;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.1s ease;
    }

    .delay-btn:hover { background-color: #333; }
    .delay-btn:active { background-color: #666; border-color: #444; }
    .snooze-btn:hover { background-color: #f0f0f0; }
    .snooze-btn:active { background-color: #ddd; }

    .delay-btn:disabled,
    .snooze-btn:disabled {
      background-color: #ccc;
      border-color: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      background: #f3f3f3;
      font-size: 11pt;
      line-height: 1.35;
    }

    .status strong { display: block; margin-bottom: 4px; }

    hr { border: none; border-top: 1px solid #ddd; margin: 16px 0; }
  </style>
</head>

<body>

  <div class="section-label">Delay Send</div>
  <div style="font-size:10pt;color:#555;margin-bottom:8px;">
    Schedules delivery and sends immediately from compose.
  </div>
  <button id="2hour" class="delay-btn">Send in 2 Hours</button>
  <button id="4hour" class="delay-btn">Send in 4 Hours</button>
  <button id="6hour" class="delay-btn">Send in 6 Hours</button>

  <hr />

  <div class="section-label">Snooze Email</div>
  <div style="font-size:10pt;color:#555;margin-bottom:8px;">
    Hides this email and returns it to your inbox after the selected time.
  </div>
  <button id="2snooze" class="snooze-btn">⏱ Snooze 2 Hours</button>
  <button id="4snooze" class="snooze-btn">⏱ Snooze 4 Hours</button>
  <button id="6snooze" class="snooze-btn">⏱ Snooze 6 Hours</button>

  <div id="status" class="status">
    <strong>Status</strong>
    Ready.
  </div>

<script>
  // ⬇️ Paste your Power Automate HTTP trigger URL here
  const POWER_AUTOMATE_URL = "https://prod-XX.westus.logic.azure.com:443/workflows/YOUR_FLOW_URL";

  Office.onReady((info) => {
    if (info.host !== Office.HostType.Outlook) return;

    // Wire up delay-send buttons (compose mode)
    wireDelayButton("2hour", 2);
    wireDelayButton("4hour", 4);
    wireDelayButton("6hour", 6);

    // Wire up snooze buttons (read mode)
    wireSnoozeButton("2snooze", 2);
    wireSnoozeButton("4snooze", 4);
    wireSnoozeButton("6snooze", 6);

    // Show/hide sections based on mode
    const mode = Office.context.mailbox.item?.itemType;
    if (mode === Office.MailboxEnums.ItemType.Message) {
      // Likely read mode — check compose vs read
      const isCompose = typeof Office.context.mailbox.item.sendAsync === "function";
      if (isCompose) {
        hideSnoozSection();
      } else {
        hideDelaySendSection();
      }
    }
  });

  function hideDelaySendSection() {
    ["2hour","4hour","6hour"].forEach(id => document.getElementById(id).style.display = "none");
    document.querySelectorAll(".section-label")[0].style.display = "none";
    document.querySelector("hr").style.display = "none";
    document.querySelectorAll("[style*='Schedules delivery']")[0]?.style && 
      (document.querySelectorAll("div")[1].style.display = "none");
  }

  function hideSnoozSection() {
    ["2snooze","4snooze","6snooze"].forEach(id => document.getElementById(id).style.display = "none");
    document.querySelectorAll(".section-label")[1].style.display = "none";
  }

  // --- Delay Send ---
  function wireDelayButton(id, hours) {
    document.getElementById(id).addEventListener("click", async () => {
      setAllButtonsEnabled(false);
      setStatus("Status", `Scheduling delivery for +${hours} hour(s)…`);
      try {
        const delayUntil = new Date(Date.now() + hours * 60 * 60 * 1000);
        await setDelayAsync(delayUntil);
        setStatus("Status", `Scheduled for ${delayUntil.toLocaleString()}. Sending…`);
        await sendAsync();
        setStatus("Status", `Sent. Will deliver at ${delayUntil.toLocaleString()}.`);
      } catch (err) {
        setStatus("Error", err?.message || String(err));
        setAllButtonsEnabled(true);
      }
    });
  }

  // --- Snooze ---
  function wireSnoozeButton(id, hours) {
    document.getElementById(id).addEventListener("click", async () => {
      setAllButtonsEnabled(false);
      setStatus("Status", `Snoozing for ${hours} hour(s)…`);
      try {
        const itemId = Office.context.mailbox.item.itemId;
        if (!itemId) throw new Error("Could not get email ID. Are you reading an email?");

        // Convert to EWS ID format that Power Automate expects
        const ewsId = Office.context.mailbox.convertToEwsId(
          itemId,
          Office.MailboxEnums.RestVersion.v2_0
        );

        const response = await fetch(POWER_AUTOMATE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ itemId: ewsId, hours: hours })
        });

        if (!response.ok) throw new Error(`Flow returned ${response.status}. Check your Power Automate URL.`);

        const wakeTime = new Date(Date.now() + hours * 60 * 60 * 1000);
        setStatus("Snoozed ✓", `This email will return to your inbox at ${wakeTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}.`);
      } catch (err) {
        setStatus("Error", err?.message || String(err));
        setAllButtonsEnabled(true);
      }
    });
  }

  // --- Helpers ---
  function setAllButtonsEnabled(enabled) {
    document.querySelectorAll(".delay-btn, .snooze-btn").forEach(btn => btn.disabled = !enabled);
  }

  function setStatus(title, message) {
    const el = document.getElementById("status");
    el.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(message)}`;
  }

  function setDelayAsync(delayUntil) {
    return new Promise((resolve, reject) => {
      const item = Office.context.mailbox.item;
      if (!item?.delayDeliveryTime?.setAsync) {
        reject(new Error("delayDeliveryTime isn't available in this context."));
        return;
      }
      item.delayDeliveryTime.setAsync(delayUntil, r => {
        r.status === Office.AsyncResultStatus.Succeeded ? resolve() :
          reject(new Error(r.error?.message || "Failed to set delay."));
      });
    });
  }

  function sendAsync() {
    return new Promise((resolve, reject) => {
      const item = Office.context.mailbox.item;
      if (!item?.sendAsync) {
        reject(new Error("sendAsync isn't available in this context."));
        return;
      }
      item.sendAsync(r => {
        r.status === Office.AsyncResultStatus.Succeeded ? resolve() :
          reject(new Error(r.error?.message || "Failed to send."));
      });
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])
    );
  }
</script>
</body>
</html>
